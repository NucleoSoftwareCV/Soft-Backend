spring.application.name=oona-be
server.port=8083

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Migraciones
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}

# OpenAPI / Swagger
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:true}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:true}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.filter=true
springdoc.packages-to-scan=com.hean.consigueventas.oonabe
springdoc.paths-to-match=/api/**

# Base de Datos
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Seguridad JWT (expiration: 15 minutos en ms)
api.security.token.secret=${JWT_SECRET}
api.security.token.expiration=${JWT_EXPIRATION_MS}
api.security.refresh.expiration=${JWT_REFRESH_EXPIRATION_MS}

# Observabilidad
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
logging.level.org.springframework.security=DEBUG