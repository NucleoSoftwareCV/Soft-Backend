spring.application.name=oona-be
server.port=8083

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false


# OpenAPI / Swagger
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:true}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:true}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.filter=true
springdoc.packages-to-scan=com.hean.consigueventas.oonabe
springdoc.paths-to-match=/api/**

# Base de Datos por Defecto (H2 en memoria)
spring.datasource.url=jdbc:h2:mem:oonadb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Seguridad JWT (expiration: 15 minutos en ms)
api.security.token.secret=${JWT_SECRET}
api.security.token.expiration=${JWT_EXPIRATION_MS}
api.security.refresh.expiration=${JWT_REFRESH_EXPIRATION_MS}

# Observabilidad
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
logging.level.org.springframework.security=DEBUG