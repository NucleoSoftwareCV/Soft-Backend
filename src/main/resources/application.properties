spring.application.name=oona-be
server.port=8083

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Base de Datos
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/OonaDB}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:oona_user}
spring.datasource.password=${DB_PASSWORD:change-me-local-password}

# Seguridad JWT (expiration: 15 minutos en ms)
api.security.token.secret=${JWT_SECRET:dev-only-local-jwt-secret-change-in-production-1234567890}
api.security.token.expiration=${JWT_EXPIRATION_MS:900000}

# Observabilidad
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
