spring.datasource.url=jdbc:h2:mem:oona_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
api.security.token.secret=test-secret-key-test-secret-key-test-secret-key-test-secret-key
api.security.token.expiration=900000
api.security.refresh.expiration=604800000
